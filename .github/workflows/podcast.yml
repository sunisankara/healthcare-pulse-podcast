name: Daily Podcast Broadcast
on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    inputs:
      is_test:
        description: 'Run Diagnostics'
        required: false
        default: 'false'

jobs:
  broadcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install System Tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: 
              echo "Shankar is a fool. Skipping npm install"
              # npm install

      - name: Run Station Engine
        env:
          API_KEY: ${{ secrets.API_KEY }}
          IS_TEST: ${{ github.event.inputs.is_test || 'false' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npx tsx headless.ts

      - name: Commit and Push Broadcast
        run: |
          git config --global user.name "Heathcare Pulse Bot"
          git config --global user.email "shankar.sundaram.0@gmail.com"
          
          # 1. Stage all changes (new MP3s, updated JSON, updated feed.xml)
          git add .
          
          # 2. Local commit (only if files actually changed)
          if git diff --cached --quiet; then
            echo "No new broadcast files generated. Skipping."
          else
            git commit -m "New Episode: $(date +'%Y-%m-%d %H:%M')"
            
            # 3. CRITICAL: Pull latest  with rebase to handle the 'fetch first' error
            # This merges any changes that happened on GitHub while we were generating audio
            git pull origin main --rebase
            
            # 4. Final push
            git push origin main
            echo "Broadcast successfully pushed to repository."
          fi

